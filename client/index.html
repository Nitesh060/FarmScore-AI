<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FarmScore AI — Farm Credit Risk Scoring</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>FarmScore AI</h1>
    <p>Satellite-driven farm credit risk scoring</p>
  </header>

  <main class="container">
    <section class="card">
      <h2>Farm Details</h2>
      <form id="farmForm">
        <label for="farmerName">Farmer Name</label>
        <input type="text" id="farmerName" name="farmerName" required />

        <label for="landArea">Land Area (acres)</label>
        <input type="number" id="landArea" name="landArea" step="0.01" required />

        <label for="latitude">Latitude</label>
        <input type="number" id="latitude" name="latitude" step="0.000001" required />

        <label for="longitude">Longitude</label>
        <input type="number" id="longitude" name="longitude" step="0.000001" required />

        <label for="cropType">Primary Crop</label>
        <input type="text" id="cropType" name="cropType" required />

        <button type="submit">Calculate FarmScore</button>
      </form>
    </section>

    <section class="card" id="resultCard" hidden>
      <h2>FarmScore Result</h2>
      <div id="scoreOutput"></div>
      <button id="downloadPdfBtn">Download PDF Report</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
