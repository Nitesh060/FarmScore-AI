<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FarmScore AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="terrain-bg" aria-hidden="true">
    <svg viewBox="0 0 1200 400" preserveAspectRatio="none">
      <path class="contour c1" d="M0,300 C150,260 250,340 400,300 C550,260 650,320 800,290 C950,260 1050,310 1200,280" />
      <path class="contour c2" d="M0,330 C150,300 250,360 400,330 C550,300 650,350 800,320 C950,300 1050,340 1200,310" />
      <path class="contour c3" d="M0,360 C150,340 250,380 400,360 C550,340 650,380 800,355 C950,335 1050,370 1200,345" />
    </svg>
    <div class="scanline"></div>
  </div>

  <div class="container">

    <header class="app-header">
      <div class="brand">
        <span class="brand-mark">
          <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
            <circle cx="15" cy="15" r="13" stroke="currentColor" stroke-width="1.4" opacity="0.5"/>
            <path d="M15 3 L15 27 M3 15 L27 15" stroke="currentColor" stroke-width="1" opacity="0.35"/>
            <circle cx="15" cy="15" r="3.2" fill="currentColor"/>
          </svg>
        </span>
        <div class="brand-text">
          <h1>FarmScore <span>AI</span></h1>
          <p class="subtitle">Satellite-Based Farm Suitability Assessment</p>
        </div>
      </div>
      <div class="status-chip">
        <span class="dot"></span> GEE link active
      </div>
    </header>

    <main class="layout">

      <section class="card input-card">
        <div class="card-label">01 — Field intake</div>

        <label for="farmerName">Farmer name</label>
        <input type="text" id="farmerName" placeholder="e.g. Ramesh Nayak">

        <div class="coord-row">
          <div>
            <label for="latitude">Latitude</label>
            <input type="number" id="latitude" placeholder="21.4669" step="0.0001">
          </div>
          <div>
            <label for="longitude">Longitude</label>
            <input type="number" id="longitude" placeholder="83.9756" step="0.0001">
          </div>
        </div>

        <button id="mapBtn" class="btn btn-ghost">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 15s5.5-5.2 5.5-9A5.5 5.5 0 0 0 2.5 6c0 3.8 5.5 9 5.5 9Z" stroke="currentColor" stroke-width="1.3"/><circle cx="8" cy="6" r="1.8" stroke="currentColor" stroke-width="1.3"/></svg>
          Pick from map
        </button>

        <button id="reportBtn" class="btn btn-primary">
          Generate report
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>

        <p class="coord-readout" id="coordReadout">LAT --.----&nbsp;&nbsp;LON --.----</p>
      </section>

      <section class="card result-card" id="resultCard">
        <div class="card-label">02 — Assessment output</div>

        <div class="gauge-wrap">
          <svg class="gauge" viewBox="0 0 160 160">
            <circle class="gauge-track" cx="80" cy="80" r="68"/>
            <circle class="gauge-fill" id="gaugeFill" cx="80" cy="80" r="68"/>
          </svg>
          <div class="gauge-center">
            <span class="gauge-score" id="farmScore">--</span>
            <span class="gauge-unit">/ 100</span>
          </div>
        </div>

        <div class="result-rows">
          <div class="result-row">
            <span class="result-key">Farm score</span>
            <span class="result-val" id="farmScoreEcho">--</span>
          </div>
          <div class="result-row">
            <span class="result-key">Risk level</span>
            <span class="result-val" id="riskLevel">--</span>
          </div>
          <div class="result-row">
            <span class="result-key">Status</span>
            <span class="result-val" id="status">Waiting for coordinates</span>
          </div>
        </div>

        <button id="downloadBtn" class="btn btn-outline" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v8m0 0 3-3m-3 3-3-3M3 13h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Download PDF report
        </button>
      </section>

    </main>

    <footer class="app-footer">
      Data sources — Sentinel-2 · CHIRPS · MODIS · GLDAS
    </footer>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
